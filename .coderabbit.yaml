language: "ko-KR"

reviews:
  profile: "chill"
  high_level_summary: true
  poem: true
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.g.dart"
    - "!**/*.freezed.dart"
    - "!ios/Pods/**"
    - "!ios/Runner.xcodeproj/**"
    - "!android/gradle/**"

chat:
  auto_reply: true
